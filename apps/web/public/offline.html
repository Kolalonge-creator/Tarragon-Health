<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>You're offline — TarragonHealth</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f2;
        color: #1c1917;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      main {
        max-width: 360px;
      }
      img {
        width: 72px;
        height: 72px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 24px;
        color: #57534e;
        line-height: 1.5;
      }
      button {
        background: #0e7c52;
        color: #ffffff;
        border: 0;
        border-radius: 10px;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>You&rsquo;re offline</h1>
      <p>
        TarragonHealth needs a connection to show your latest readings and
        messages. Your care team is still here &mdash; reconnect and try again.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
