# Tarragon Health — Supabase project configuration.
#
# NOTE: The production project must be created in the af-south-1 (Cape Town)
# region for NDPR data residency (CLAUDE.md / ARCHITECTURE.md). Region is a
# cloud/dashboard setting, not expressed here. This file configures local
# development (`supabase start`) and is the source of truth for auth settings.
project_id = "tarragon-health"

[api]
enabled = true
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed/seed.sql"]

[studio]
enabled = true

[auth]
enabled = true
# Every patient must be reachable via WhatsApp/SMS; phone is a first-class
# identity alongside email.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true

# Phone OTP (Termii/WhatsApp in production; see ARCHITECTURE.md §8). Numbers
# are always stored E.164 (+234XXXXXXXXXX).
[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Your Tarragon Health code is {{ .Code }}"

[edge_runtime]
enabled = true

# Meta calls this unauthenticated (no Supabase JWT) — GET handshake uses
# hub.verify_token, POST is validated via X-Hub-Signature-256 when
# WHATSAPP_APP_SECRET is set (docs/ARCHITECTURE.md §8).
[functions.whatsapp-webhook]
verify_jwt = false

# Paystack calls this unauthenticated (no Supabase JWT) — validated instead
# via HMAC-SHA512 x-paystack-signature when PAYSTACK_WEBHOOK_SECRET is set.
[functions.paystack-webhook]
verify_jwt = false

# Stripe calls this unauthenticated (no Supabase JWT) — validated instead via
# stripe-signature, checked with the Stripe SDK's constructEventAsync when
# STRIPE_WEBHOOK_SECRET is set.
[functions.stripe-webhook]
verify_jwt = false

# Zoom calls this unauthenticated (no Supabase JWT) — validated instead via
# x-zm-signature (HMAC-SHA256 of the raw body) when ZOOM_WEBHOOK_SECRET_TOKEN
# is set. Also answers Zoom's one-time endpoint.url_validation handshake
# needed to activate the webhook subscription.
[functions.zoom-webhook]
verify_jwt = false
